services:
  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env.development.frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  backend:
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.development.backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    user: root
    # DB準備 > DB初期化 > Gunicorn実行 の順番
    command: >
      sh -c "python /app/wait_for_db.py &&
             python /app/db_manage.py init &&
             chown -R appuser:appgroup /app/logs &&
             exec gunicorn --bind 0.0.0.0:5001 --reload --user appuser --group appgroup 'app:app'"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/auth/health"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  nginx:
    ports:
      - "80:80"
    build:
      context: ./nginx
      dockerfile: Dockerfile.dev
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── PostgreSQL (MySQL の代替) ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-luminine}
      POSTGRES_USER: ${DB_USER:-superuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superpass!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d  # 初期化 SQL をマウント
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-superuser} -d ${DB_NAME:-luminine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- テスト専用サービス ---
  backend-test:
    user: root
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
      - ./db/init:/app/db/init
    env_file:
      - ./backend/.env.development.backend
    environment:
      - PYTHONPATH=/app
    depends_on:
      backend:
        condition: service_healthy
    command: ["tail", "-f", "/dev/null"]
    networks:
      - app-network

networks:
  app-network:
    name: app-network

volumes:
  postgres_data_local: