services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-container
    ports:
      - "3000:3000" # Next.jsのデフォルトポート
    env_file:
      - ./frontend/.env.production.frontend
    restart: always
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-container
    ports:
      - "5001:5001"
    volumes:
      - ./backend/logs:/app/logs:rw
      - ./backend/data:/app/data:ro  # データディレクトリをマウント（読み取り専用）
    env_file:
      - ./backend/.env.production.backend
    environment:
      LANG: en_US.UTF-8
      LC_CTYPE: en_US.UTF-8
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s # gunicorn開始及び、DB 初期化時間を考慮して少し長く設定

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-container
    restart: always
    ports:
      - "80:80"
      - "443:443" # <<< HTTPSポート
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - app-network

# <<< Certbot サービス 追加 >>>
  certbot:
    image: certbot/certbot
    container_name: certbot-container
    # restart: unless-stopped # 必要に応じて再起動ポリシーを設定
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # デフォルトコマンドは更新試行。初回発行時は別コマンドで実行。
    command: renew --quiet --agree-tos

networks:
  app-network:
    driver: bridge
