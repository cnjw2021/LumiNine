name: Docker Build and Push to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    # PostgreSQL 서비스 컨테이너 (MySQL 대체)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: luminine
          POSTGRES_USER: superuser
          POSTGRES_PASSWORD: superpass!
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: luminine
      DB_USER: superuser
      DB_PASSWORD: "superpass!"

    steps:
      # 1. GitHub 저장소의 코드를 가져옴
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 테스트 환경 준비 및 실행
      - name: Prepare mock environment files and directories
        run: |
          touch frontend/.env.production.frontend
          touch frontend/.env.development.frontend

          # IMPORTANT: Truncate (not touch!) production env to prevent its
          # DATABASE_URL from overriding CI test credentials
          > backend/.env.production.backend

          # Backend .env for Python app (PostgreSQL 기반)
          echo "SECRET_KEY=testsecretkey" > backend/.env.development.backend
          echo "JWT_SECRET_KEY=testjwtsecretkey" >> backend/.env.development.backend
          echo "DB_USER=$DB_USER" >> backend/.env.development.backend
          echo "DB_PASSWORD=$DB_PASSWORD" >> backend/.env.development.backend
          echo "DB_HOST=localhost" >> backend/.env.development.backend
          echo "DB_NAME=$DB_NAME" >> backend/.env.development.backend
          echo "DB_PORT=5432" >> backend/.env.development.backend
          echo "DATABASE_URL=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}" >> backend/.env.development.backend
          echo "SUPERUSER_EMAIL=superuser" >> backend/.env.development.backend
          echo "SUPERUSER_PASSWORD=$DB_PASSWORD" >> backend/.env.development.backend

          echo "--- Generated backend/.env.development.backend ---"
          cat backend/.env.development.backend

          mkdir -p backend/logs backend/.pytest_cache
          chmod -R 777 backend/logs backend/.pytest_cache

      # 3. Python 설정 및 단위 테스트 실행 (Docker 없이 직접 실행)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Unit Tests
        working-directory: backend
        run: |
          set -a; source .env.development.backend; set +a
          pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: .

      # GHCR은 소문자 레포지토리 이름만 허용하므로 소문자로 변환
      - name: Convert image name to lowercase
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 4. GHCR (GitHub Container Registry) 에 로그인
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 각 서비스별 Docker 이미지 빌드 및 GHCR에 Push
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
