name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      # Artifact Registry 경로: {REGION}-docker.pkg.dev/{PROJECT}/{REPO}/{IMAGE}
      AR_REPO: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/luminine-docker-repo/luminine-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Google Cloud 인증 (이미지 푸시 + Cloud Run 배포 모두 사용) ────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 2. Artifact Registry 에 Docker 이미지 빌드 & 푸시 ──────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.AR_REPO }}:latest
            ${{ env.AR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Cloud Run 배포 ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy "${{ secrets.GCP_SERVICE_NAME }}" \
            --image "${{ env.AR_REPO }}:${{ github.sha }}" \
            --platform managed \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --port 5001 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 80 \
            --timeout 60 \
            --update-env-vars "^|^DATABASE_URL=${{ secrets.DATABASE_URL }}|SECRET_KEY=${{ secrets.SECRET_KEY }}|JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}|SUPERUSER_EMAIL=${{ secrets.SUPERUSER_EMAIL }}|SUPERUSER_PASSWORD=${{ secrets.SUPERUSER_PASSWORD }}|FLASK_ENV=production"
